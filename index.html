<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrutinio Sindical</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#003366;
}

.contador{
font-size:50px;
font-weight:bold;
margin:15px;
}

button{
width:90%;
max-width:350px;
padding:18px;
margin:10px;
font-size:24px;
border:none;
border-radius:12px;
color:white;
}

.ccoo{background:#d60000;}
.ugt{background:#009933;}
.blanco{background:#666;}
.nulo{background:#111;}
.reset{background:#0066cc;}

.total{
font-size:28px;
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>ESCRUTINIO SINDICAL</h1>

<div class="contador" id="total">0</div>

<button class="ccoo" onclick="sumar('ccoo')">
CCOO (<span id="ccoo">0</span>)
</button>

<button class="ugt" onclick="sumar('ugt')">
UGT (<span id="ugt">0</span>)
</button>

<button class="blanco" onclick="sumar('blanco')">
BLANCO (<span id="blanco">0</span>)
</button>

<button class="nulo" onclick="sumar('nulo')">
NULO (<span id="nulo">0</span>)
</button>

<button class="reset" onclick="reiniciar()">
REINICIAR
</button>

<script>

let votos={
ccoo:0,
ugt:0,
blanco:0,
nulo:0
};

function actualizar(){

document.getElementById("ccoo").innerHTML=votos.ccoo;
document.getElementById("ugt").innerHTML=votos.ugt;
document.getElementById("blanco").innerHTML=votos.blanco;
document.getElementById("nulo").innerHTML=votos.nulo;

document.getElementById("total").innerHTML=
votos.ccoo+votos.ugt+votos.blanco+votos.nulo;

localStorage.setItem("votos",JSON.stringify(votos));

}

function sumar(tipo){
votos[tipo]++;
actualizar();
}

function reiniciar(){

if(confirm("¿Reiniciar escrutinio?")){
votos={
ccoo:0,
ugt:0,
blanco:0,
nulo:0
};
actualizar();
}

}

let guardado=localStorage.getItem("votos");

if(guardado){
votos=JSON.parse(guardado);
}

actualizar();

</script>

</body>
</html>
