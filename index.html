<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrutinio Sindical 2.0</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

<div id="inicio" class="card">

<h1>ESCRUTINIO SINDICAL</h1>

<label>Empresa</label>
<input
id="empresa"
type="text"
placeholder="Nombre de la empresa">

<label>Centro de trabajo</label>
<input
id="centro"
type="text"
placeholder="Centro de trabajo">

<label>Mesa electoral</label>
<input
id="mesa"
type="text"
placeholder="Mesa">

<label>Papeletas esperadas</label>
<input
id="esperadas"
type="number"
placeholder="0">

<button
class="btn-principal"
onclick="comenzar()">

COMENZAR ESCRUTINIO

</button>

</div>

<div
id="escrutinio"
class="card oculto">

<h2>Recuento</h2>

<div class="total" id="total">
0
</div>

<button class="btn-ccoo"
onclick="sumar('ccoo')">

🔴 CCOO
(<span id="votosCCOO">0</span>)

</button>

<button class="btn-ugt"
onclick="sumar('ugt')">

🟢 UGT
(<span id="votosUGT">0</span>)

</button>

<button class="btn-blanco"
onclick="sumar('blanco')">

⚪ Blancos
(<span id="votosBlanco">0</span>)

</button>

<button class="btn-nulo"
onclick="sumar('nulo')">

⚫ Nulos
(<span id="votosNulo">0</span>)

</button>

<div class="resumen">

<strong>Papeletas esperadas:</strong>

<span id="txtEsperadas">0</span>

<br><br>

<strong>Pendientes:</strong>

<span id="pendientes">0</span>

</div>

<button
class="btn-principal"
onclick="deshacer()">

↩️ DESHACER

</button>

<button
class="btn-principal"
onclick="finalizar()">

✅ FINALIZAR

</button>

</div>

<div
id="resultado"
class="card oculto">

<h2>Resultado del escrutinio</h2>

<div id="resultadoTexto">

</div>

<button
class="btn-principal"
onclick="nuevoEscrutinio()">

NUEVO ESCRUTINIO

</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
